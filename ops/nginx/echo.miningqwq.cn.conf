upstream miningqwq_next_frontend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name echo.miningqwq.cn;

    # 建议：HTTP 全量跳转到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name echo.miningqwq.cn;

    # 请替换为宝塔签发后的证书路径
    ssl_certificate     /www/server/panel/vhost/cert/echo.miningqwq.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/echo.miningqwq.cn/privkey.pem;

    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js/WS 兼容
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;

        proxy_pass http://miningqwq_next_frontend;
    }
}
